# ripcord pipeline configuration
#
# Targets to analyze. Each entry is a short name mapped to the ELF path
# (absolute or relative to the repo root) and an optional description.
# Paths typically live under targets/<name>/, which is gitignored.
#
# To add a new target: build the ELF somewhere, drop it under
# targets/<name>/, and add an entry here. No Snakemake rules need to change.

targets:
  pico_blinky:
    elf: targets/pico_blinky/blink.elf
    description: "Raspberry Pi Pico SDK blinky example, Cortex-M0+, bare metal"
    arch: arm
    build_tuple: m0plus-O3-newlib
    source: "pico-sdk/src/rp2_common/pico_blink"
    svd: targets/_svd/RP2040.svd

  zephyr_hello_world:
    elf: targets/zephyr_hello_world/zephyr.elf
    description: "Zephyr hello_world sample on qemu_cortex_m3 (TI LM3S6965)"
    arch: arm
    build_tuple: m3-Os-picolibc
    source: "zephyrproject/zephyr/samples/hello_world"
    svd: targets/_svd/LM3S6965.svd
    scenarios:
      boot:
        resc: scripts/renode/zephyr_hello_boot.resc
        repl: scripts/renode/lm3s6965.repl
        duration: "0:0:2"

  zephyr_synchronization:
    elf: targets/zephyr_synchronization/zephyr.elf
    description: "Zephyr synchronization sample (two threads, semaphores) on qemu_cortex_m3"
    arch: arm
    build_tuple: m3-Os-picolibc
    source: "zephyrproject/zephyr/samples/synchronization"
    svd: targets/_svd/LM3S6965.svd
    scenarios:
      boot:
        resc: scripts/renode/zephyr_sync_boot.resc
        repl: scripts/renode/lm3s6965.repl
        duration: "0:0:5"
      steady:
        resc: scripts/renode/zephyr_sync_steady.resc
        repl: scripts/renode/lm3s6965.repl
        duration: "0:0:20"

  pico_freertos_hello:
    elf: targets/pico_freertos_hello/hello_freertos.elf
    description: "Pico SDK + FreeRTOS hello_freertos (one core), Cortex-M0+, -O3, newlib"
    arch: arm
    build_tuple: m0plus-O3-newlib
    source: "pico-examples/freertos/hello_freertos"
    svd: targets/_svd/RP2040.svd

  pico_freertos_static:
    elf: targets/pico_freertos_static/hello_freertos_static.elf
    description: "Pico SDK + FreeRTOS static allocation variant, Cortex-M0+, -O3, newlib"
    arch: arm
    build_tuple: m0plus-O3-newlib
    source: "pico-examples/freertos/hello_freertos (static alloc)"
    svd: targets/_svd/RP2040.svd

  pico_hello_usb:
    elf: targets/pico_hello_usb/hello_usb.elf
    description: "Pico SDK hello_world USB CDC example, Cortex-M0+, -O3, newlib + TinyUSB"
    arch: arm
    build_tuple: m0plus-O3-newlib
    source: "pico-examples/hello_world/usb"
    svd: targets/_svd/RP2040.svd

  pico_hello_timer:
    elf: targets/pico_hello_timer/hello_timer.elf
    description: "Pico SDK timer hello example, Cortex-M0+, -O3, newlib"
    arch: arm
    build_tuple: m0plus-O3-newlib
    source: "pico-examples/timer/hello_timer"
    svd: targets/_svd/RP2040.svd

  pico_freertos_hello_stripped:
    elf: targets/pico_freertos_hello_stripped/hello_freertos_stripped.elf
    description: "Stripped pico_freertos_hello — blind recovery test target"
    arch: arm
    build_tuple: m0plus-O3-newlib
    source: "pico-examples/freertos/hello_freertos (stripped)"
    svd: targets/_svd/RP2040.svd

  stock_v103:
    elf: targets/stock_v103/stock_v103.bin
    description: "FNIRSI 2C53T stock firmware V1.0.3"
    arch: arm
    build_tuple: m4-keil-O2
    source: "FNIRSI manufacturer download"
    raw_binary: true
    base_addr: 0x08004000
    svd: targets/_svd/AT32F403Axx_v2.svd

  stock_v107:
    elf: targets/stock_v107/stock_v107.bin
    description: "FNIRSI 2C53T stock firmware V1.0.7"
    arch: arm
    build_tuple: m4-keil-O2
    source: "FNIRSI manufacturer download"
    raw_binary: true
    base_addr: 0x08004000
    svd: targets/_svd/AT32F403Axx_v2.svd

  stock_v112:
    elf: targets/stock_v112/stock_v112.bin
    description: "FNIRSI 2C53T stock firmware V1.1.2"
    arch: arm
    build_tuple: m4-keil-O2
    source: "FNIRSI manufacturer download"
    raw_binary: true
    base_addr: 0x08004000
    svd: targets/_svd/AT32F403Axx_v2.svd

  stock_v120:
    elf: targets/stock_v120/stock_v120.bin
    description: "FNIRSI 2C53T stock firmware V1.2.0, AT32F403A Cortex-M4, Keil MDK"
    arch: arm
    build_tuple: m4-keil-O2
    source: "FNIRSI manufacturer download"
    raw_binary: true
    base_addr: 0x08004000
    svd: targets/_svd/AT32F403Axx_v2.svd

  at32_hal_blinky:
    elf: targets/at32_hal_blinky/at32_hal_blinky.elf
    description: "AT32F403A HAL blinky, Cortex-M4, arm-none-eabi-gcc -O2, nano.specs"
    arch: arm
    build_tuple: m4-O2-nano
    source: "AT32F403A_407_Firmware_Library template (GPIO + CRM + clock + delay)"
    svd: targets/_svd/AT32F403Axx_v2.svd

  at32_freertos_hello:
    elf: targets/at32_freertos_hello/at32_freertos_hello.elf
    description: "AT32F403A HAL + FreeRTOS, Cortex-M4, arm-none-eabi-gcc -O2, nano.specs"
    arch: arm
    build_tuple: m4-O2-nano
    source: "AT32F403A_407_Firmware_Library template + FreeRTOS (4 tasks, heap_4)"
    svd: targets/_svd/AT32F403Axx_v2.svd

  at32_hal_blinky_llvm:
    elf: targets/at32_hal_blinky_llvm/at32_hal_blinky_llvm.elf
    description: "AT32F403A HAL blinky, Cortex-M4, LLVM clang 19.1.5 -O2"
    arch: arm
    build_tuple: m4-llvm-O2
    source: "AT32F403A_407_Firmware_Library template, LLVM embedded toolchain"
    svd: targets/_svd/AT32F403Axx_v2.svd

  # Uncomment and add entries as you build more targets.
